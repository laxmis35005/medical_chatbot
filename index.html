<!DOCTYPE html>
<html>
<head>
<title>Medical Chatbot</title>
<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="chat-container">


<div class="header">
Medical Chatbot
</div>

<div class="chat-box" id="chatBox">

<div class="message bot">
Hello... <br>
Enter your symptoms (e.g. fever,cough,headache)
</div>

</div>


<div class="input-area">
<input type="text" id="inputMsg" placeholder="Type symptoms...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

function sendMessage(){

let input=document.getElementById("inputMsg")
let message=input.value.trim()

if(message==="") return

let chatBox=document.getElementById("chatBox")


let userMsg=document.createElement("div")
userMsg.className="message user"
userMsg.innerText=message
chatBox.appendChild(userMsg)

fetch("/predict",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({symptoms:message})
})
.then(res=>res.json())
.then(data=>{


let botMsg=document.createElement("div")
botMsg.className="message bot"
botMsg.innerHTML=
" Disease: "+data.disease+"<br> Medicine: "+data.medicine

chatBox.appendChild(botMsg)

chatBox.scrollTop=chatBox.scrollHeight

})

input.value=""

}

</script>

</body>
</html>
